# Deploy the Python MCP Worker to Cloudflare Workers
# Triggered on every push to main.
# Requires: CF_API_TOKEN secret set in repo Settings → Secrets → Actions.
name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      # Install runtime deps + dev group (pywrangler).
      # --no-install-project skips building the wheel (not needed for Workers).
      - name: Install dependencies
        run: uv sync --group dev --no-install-project

      - name: Deploy with pywrangler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: uv run pywrangler deploy
